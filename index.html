<title>Ceydoşun Mali Durumu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#45142E;
    --bg:#FBEDF2;
    --surface:#FFFFFF;
    --surface-2:#FBE5EC;
    --paid:#A12C66;
    --due:#DC4E86;
    --overdue:#D63C3C;
    --income:#C23B7C;
    --muted:#8A6175;
    --line:#F1D2DD;
    --line-soft:#F7E2E9;
    --shadow:0 1px 2px rgba(69,20,46,.06), 0 8px 24px rgba(69,20,46,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Inter",system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.4;
  }
  .wrap{max-width:560px;margin:0 auto;padding:calc(18px + env(safe-area-inset-top)) 16px 130px;min-height:100%}

  /* Header */
  .topbar{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px}
  .brand{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:23px;letter-spacing:-.02em;line-height:1.1}
  .brand .coin{font-size:21px}
  .brand .q{color:var(--due)}
  .brand small{display:block;font-family:"Inter";font-weight:500;font-size:12px;color:var(--muted);letter-spacing:0;margin-top:6px}

  /* Month nav */
  .monthnav{display:flex;align-items:center;justify-content:center;gap:10px;margin:0 0 16px}
  .monthnav button{
    width:34px;height:34px;border:1px solid var(--line);background:var(--surface);
    border-radius:50%;cursor:pointer;color:var(--ink);font-size:16px;line-height:1;
    display:grid;place-items:center;transition:background .15s,border-color .15s
  }
  .monthnav button:hover{background:var(--surface-2);border-color:var(--muted)}
  .monthnav .label{font-family:"Bricolage Grotesque";font-weight:700;font-size:17px;min-width:160px;text-align:center}

  /* Summary hero */
  .hero{
    background:var(--ink);color:#FBE2EC;border-radius:18px;padding:20px;margin-bottom:14px;
    box-shadow:var(--shadow);position:relative;overflow:hidden
  }
  .hero .eyebrow{font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:#E3A5C2;font-weight:600}
  .hero .answer{display:flex;align-items:baseline;gap:10px;margin-top:6px}
  .hero .count{font-family:"Bricolage Grotesque";font-weight:800;font-size:40px;line-height:1;letter-spacing:-.02em}
  .hero .count.zero{color:#FFC2DD}
  .hero .answer .unit{font-size:14px;color:#EBBAD2}
  .hero .due-amt{font-family:"DM Mono";font-size:14px;color:#FFCBE2;margin-top:4px}
  .hero .due-amt.zero{color:#FFC2DD}
  .hero .cari-cap{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#E3A5C2;font-weight:700;margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,.14)}
  .hero .split{display:flex;gap:10px;margin-top:9px}
  .hero .split div{flex:1}
  .hero .split .k{font-size:11px;letter-spacing:.03em;text-transform:uppercase;color:#E3A5C2;font-weight:600}
  .hero .split .v{font-family:"DM Mono";font-size:16px;margin-top:3px;font-weight:500}
  .hero .split .v.inc{color:#FFC2DD}
  .hero .split .v.bal-neg{color:#F6A8A8}

  /* Sections */
  .section{margin-top:22px}
  .section-head{display:flex;align-items:center;gap:10px;margin:0 4px 10px}
  .section-head h2{font-family:"Bricolage Grotesque";font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .section-head .rule{flex:1;height:1px;background:var(--line)}
  .section-head .tag{font-family:"DM Mono";font-size:12px;color:var(--muted)}

  /* Item card */
  .list{display:flex;flex-direction:column;gap:8px}
  .item{
    background:var(--surface);border:1px solid var(--line-soft);border-radius:14px;
    padding:11px 12px;display:flex;align-items:center;gap:11px;box-shadow:var(--shadow);
    transition:opacity .25s,transform .12s
  }
  .item:active{transform:scale(.995)}
  .cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .check{
    width:48px;height:34px;border-radius:18px;border:2px solid var(--due);
    background:transparent;cursor:pointer;flex-shrink:0;display:grid;place-items:center;
    transition:background .2s,border-color .2s;padding:0;-webkit-tap-highlight-color:transparent
  }
  .check svg{width:18px;height:18px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:opacity .2s}
  .item.paid .check{background:var(--paid);border-color:var(--paid)}

<script>
/* ---------- Storage: Supabase bulut (cihazlar arası senkron) + localStorage yedek ---------- */
const baseKey = "odedim-mi-v1";
function dataKey(){ return baseKey + ":" + user; }
const SUPA_URL = "https://pgodgnqznrudmibbvhiz.supabase.co";
const SUPA_KEY = "sb_publishable_wESW9k3pYsN3bD4IoCc_bw_MCaCKBwS";
const SUPA_TABLE = "mali_durumu";
const supaHeaders = {
  "apikey": SUPA_KEY,
  "Authorization": "Bearer " + SUPA_KEY,
  "Content-Type": "application/json"
};
const mem = {};
const hasLS = (()=>{ try{ localStorage.setItem("__t","1"); localStorage.removeItem("__t"); return true; }catch(e){ return false; } })();

async function supaGet(k){
  const r = await fetch(`${SUPA_URL}/rest/v1/${SUPA_TABLE}?key=eq.${encodeURIComponent(k)}&select=value`, { headers: supaHeaders });
  if(!r.ok) throw new Error("supa get "+r.status);
  const rows = await r.json();
  return rows.length ? rows[0].value : null;
}
async function supaSet(k,v){
  const r = await fetch(`${SUPA_URL}/rest/v1/${SUPA_TABLE}`, {
    method:"POST",
    headers:{...supaHeaders, "Prefer":"resolution=merge-duplicates,return=minimal"},
    body: JSON.stringify({ key:k, value:v, updated_at:new Date().toISOString() })
  });
  if(!r.ok) throw new Error("supa set "+r.status);
}

const store = {
  async get(k){
    try{
      const v = await supaGet(k);
      try{ if(hasLS && v!=null) localStorage.setItem(k,v); }catch(e){}
      if(v!=null) return v;
    }catch(e){ /* internet yoksa yedeğe düş */ }
    try{ if(hasLS){ const v = localStorage.getItem(k); if(v!=null) return v; } }catch(e){}
    return mem[k] ?? null;
  },
  async set(k,v){
    mem[k]=v;
    try{ if(hasLS) localStorage.setItem(k,v); }catch(e){}
    try{ await supaSet(k,v); }catch(e){}
  }
};

/* ---------- Veri ---------- */
let data = { templates:[], instances:[], initialized:[] };
let view = new Date(); // görüntülenen ay
let user = null;       // "ceyda" | "taha"
let tab = "giderler";  // giderler | gelirler | grafik
let gview = "liste";   // takvim | kategori | liste
let selDate = null;    // takvimde seçili gün 'YYYY-MM-DD'

/* ---------- Kategoriler (kullanıcı tanımlı, renkli) ---------- */
const CAT_PALETTE = ["#E0568E","#E8A33D","#4D7CDB","#2FA98B","#D6453C","#9B59B6",
  "#5DAE6B","#E07A3C","#7C6CE0","#3FB0C9","#C2536E","#8A8F98"];

function seedCategories(){
  if(!data.categories || !data.categories.length){
    data.categories = [
      {name:"Kira",color:"#E0568E"},{name:"Market",color:"#E8A33D"},
      {name:"Yakıt",color:"#4D7CDB"},{name:"Fatura",color:"#2FA98B"},
      {name:"Yemek",color:"#D6453C"},{name:"Ulaşım",color:"#5DAE6B"},
      {name:"Sağlık",color:"#9B59B6"},{name:"Diğer",color:"#8A8F98"}
    ];
  }
  if(!data.incomeCats || !data.incomeCats.length){
    data.incomeCats = [
      {name:"Maaş",color:"#2FA98B"},{name:"Ek gelir",color:"#E0568E"},{name:"Diğer",color:"#8A8F98"}
    ];
  }
}
function catList(type){ return type==="income" ? data.incomeCats : data.categories; }
function catColor(name){
  const all=[...(data.categories||[]),...(data.incomeCats||[])];
  const f=all.find(c=>c.name===name); return f?f.color:"#8A8F98";
}
function nextCatColor(list){
  const used=new Set(list.map(c=>c.color));
  return CAT_PALETTE.find(c=>!used.has(c)) || CAT_PALETTE[list.length % CAT_PALETTE.length];
}

const MONTHS=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const pad2 = n => String(n).padStart(2,"0");
const monthKey = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}`;
const dateKey  = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const monthLabel = d => `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
const dayMon = ds => { if(!ds) return ""; const [,m,d]=ds.split("-").map(Number); return `${d} ${MONTHS[m-1].slice(0,3)}`; };
const fmt = n => new Intl.NumberFormat("tr-TR",{minimumFractionDigits:0,maximumFractionDigits:2}).format(n);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const round2 = n => Math.round(n*100)/100;

function instDate(mk,dueDay){
  const [y,m]=mk.split("-").map(Number);
  const dim=new Date(y,m,0).getDate();
  return `${mk}-${pad2(Math.min(Math.max(1,dueDay||1),dim))}`;
}
function defaultSelDate(mk){
  const ts=dateKey(new Date());
  return ts.startsWith(mk) ? ts : `${mk}-01`;
}

/* ---------- Ay başlatma: şablonlardan örnek üret ---------- */
function ensureMonth(mk){
  if(data.initialized.includes(mk)) return;
  data.templates.forEach(t=>{
    data.instances.push({
      id:uid(), templateId:t.id, type:t.type, title:t.title,
      amount:t.amount, category:t.category, dueDay:t.dueDay,
      date:instDate(mk,t.dueDay), month:mk, paid:false
    });
  });
  data.initialized.push(mk);
}

function parseSafe(s){ if(s==null) return null; try{ return JSON.parse(s); }catch(e){ return null; } }
function lsGet(k){ try{ return hasLS ? localStorage.getItem(k) : null; }catch(e){ return null; } }
function lsSet(k,v){ try{ if(hasLS) localStorage.setItem(k,v); }catch(e){} }

async function save(){
  if(!user) return;
  data._updatedAt = Date.now();           // en güncel kopya damgası
  const json = JSON.stringify(data);
  mem[dataKey()] = json;
  lsSet(dataKey(), json);                  // yerel yedek her zaman yazılır
  try{ await supaSet(dataKey(), json); }catch(e){ /* çevrimdışı: açılışta buluta gönderilecek */ }
}

async function load(){
  const key = dataKey();
  let remote=null;
  try{ remote = await supaGet(key); }catch(e){ remote=null; }     // çevrimdışıysa null
  let local = lsGet(key) ?? mem[key] ?? null;

  // Taha: eski tek-kullanıcılı veriyi yalnızca her ikisi de boşsa taşı
  if(remote==null && local==null && user==="taha"){
    try{ remote = await supaGet(baseKey); }catch(e){}
    if(remote==null) local = lsGet(baseKey);
  }

  const rObj=parseSafe(remote), lObj=parseSafe(local);
  const rT=(rObj&&rObj._updatedAt)||0, lT=(lObj&&lObj._updatedAt)||0;

  // en yeni damgalı kopyayı seç (offline eklenenler kaybolmaz)
  let chosen;
  if(rObj && lObj) chosen = (lT>rT) ? lObj : rObj;
  else chosen = rObj || lObj || {templates:[],instances:[],initialized:[]};

  data = chosen;
  data.templates = data.templates||[];
  data.instances = data.instances||[];
  data.initialized = data.initialized||[];
  seedCategories();
  data.instances.forEach(i=>{ if(!i.date) i.date = instDate(i.month, i.dueDay||1); });

  // yerel kopya buluttan yeniyse (çevrimdışı eklenmiş) buluta gönder
  const json = JSON.stringify(data);
  lsSet(key, json);
  if(lObj && lT>rT){ try{ await supaSet(key, json); }catch(e){} }
}

/* ---------- Hesaplama yardımcıları ---------- */
function monthItems(mk){ return data.instances.filter(i=>i.month===mk); }

function monthTotals(mk){
  const items = monthItems(mk);
  const exp = items.filter(i=>i.type==="expense");
  const inc = items.filter(i=>i.type==="income");
  const income  = inc.reduce((s,i)=>s+(+i.amount||0),0);
  const expense = exp.reduce((s,i)=>s+(+i.amount||0),0);
  const unpaid  = exp.filter(e=>!e.paid);
  const unpaidAmt = unpaid.reduce((s,i)=>s+(+i.amount||0),0);
  return {exp,inc,income,expense,unpaid,unpaidAmt,
          paidList:exp.filter(e=>e.paid), balance:income-expense};
}

function itemHtml(i){
  const late = i.type==="expense" && !i.paid && i.date && i.date < dateKey(new Date());
  return `<div class="item ${i.paid?'paid':''} ${i.type==='income'?'income':''}" data-id="${i.id}">
    <span class="cdot" style="background:${catColor(i.category)}"></span>
    ${i.type==="expense" ? `<button class="check" data-act="toggle" aria-label="Ödendi işaretle">
      <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></button>` : ""}
    <div class="info">
      <div class="title">${esc(i.title)} ${i.templateId?'<span class="recur-badge" title="Her ay tekrar">🔁</span>':''}${i.installmentCount?`<span class="inst-badge" title="Taksit">💳 ${i.installmentNo}/${i.installmentCount}</span>`:''}</div>
      <div class="sub-amt">₺${fmt(i.amount)}</div>
    </div>
    <div class="rdate ${late?'late':''}">${dayMon(i.date)}</div>
    <button class="del" data-act="del" aria-label="Sil">×</button>
  </div>`;
}
const byDate = arr => [...arr].sort((a,b)=>(a.date||"").localeCompare(b.date||""));

/* ---------- Giderler: 3 görünüm ---------- */
function calendarHtml(mk){
  const [y,mo]=mk.split("-").map(Number);
  let startWd=(new Date(y,mo-1,1).getDay()+6)%7; // Pazartesi=0
  const dim=new Date(y,mo,0).getDate();
  const map={};
  data.instances.filter(i=>i.type==="expense" && i.month===mk).forEach(i=>{
    const d=+(i.date||instDate(mk,i.dueDay)).split("-")[2];
    (map[d]=map[d]||[]).push(i);
  });
  const todayStr=dateKey(new Date());
  const wd=["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];
  let cells="";
  for(let i=0;i<startWd;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1; d<=dim; d++){
    const ds=`${mk}-${pad2(d)}`;
    const items=map[d]||[];
    const colors=[...new Set(items.map(it=>catColor(it.category)))].slice(0,3);
    cells+=`<button class="cal-cell ${items.length?'has':''} ${ds===selDate?'sel':''} ${ds===todayStr?'today':''}" data-day="${ds}">
      <span class="cnum">${d}</span>
      <span class="cdots">${colors.map(c=>`<i style="background:${c}"></i>`).join("")}${items.length>1?`<b>+${items.length}</b>`:""}</span>
    </button>`;
  }
  return `<div class="cal">
    <div class="cal-wd">${wd.map(w=>`<span>${w}</span>`).join("")}</div>
    <div class="cal-grid">${cells}</div>
  </div>` + dayPanel();
}
function dayPanel(){
  const items=byDate(data.instances.filter(i=>i.type==="expense" && i.date===selDate));
  const sum=items.reduce((s,i)=>s+(+i.amount||0),0);
  const unpaid=items.filter(i=>!i.paid).reduce((s,i)=>s+(+i.amount||0),0);
  const [y,m,d]=selDate.split("-").map(Number);
  return `<div class="daypanel">
    <div class="dp-head">
      <div><div class="dp-date">${d} ${MONTHS[m-1]} ${y}</div><div class="dp-sum">₺${fmt(sum)}</div></div>
      <div class="dp-right"><div class="dp-k">Ödenmemiş</div><div class="dp-v ${unpaid>0?'due':''}">₺${fmt(unpaid)}</div></div>
    </div>
    <div class="list">${items.length?items.map(itemHtml).join("")
      :`<div class="empty">Bu güne harcama yok. Sağ alttaki <strong>+ Gider/Gelir</strong> ile ekle.</div>`}</div>
  </div>`;
}
function categoryHtml(t){
  const groups={};
  t.exp.forEach(e=>{ (groups[e.category]=groups[e.category]||[]).push(e); });
  const entries=Object.entries(groups)
    .map(([c,items])=>[c,items,items.reduce((s,i)=>s+(+i.amount||0),0)])
    .sort((a,b)=>b[2]-a[2]);
  if(!entries.length) return `<div class="empty">Bu ay gider yok. Sağ alttaki <strong>+ Gider/Gelir</strong> ile ekle.</div>`;
  return entries.map(([c,items,sum])=>`<div class="cgroup">
    <div class="cg-head">
      <span class="cg-dot" style="background:${catColor(c)}"></span>
      <span class="cg-name">${esc(c)}</span>
      <span class="cg-sum">₺${fmt(sum)}</span>
    </div>
    <div class="list">${byDate(items).map(itemHtml).join("")}</div>
  </div>`).join("");
}
function listHtml(t){
  const items=byDate(t.exp);
  return `<div class="list">${items.length?items.map(itemHtml).join("")
      :`<div class="empty">Bu ay gider yok. Sağ alttaki <strong>+ Gider/Gelir</strong> ile ekle.</div>`}</div>
    <div class="gtotals">
      <div><div class="gt-k">Toplam Gider</div><div class="gt-v">₺${fmt(t.expense)}</div></div>
      <div class="right"><div class="gt-k">Kalan (ödenmemiş)</div><div class="gt-v due">₺${fmt(t.unpaidAmt)}</div></div>
    </div>`;
}

/* ---------- Cari durum bandı ---------- */
function statusBand(t, mode){
  const balCls = t.balance<0 ? 'bal-neg' : '';
  let eyebrow, big;
  if(mode==='gider'){
    eyebrow = 'Bu ay ödenmemiş';
    big = `<div class="answer">
        <span class="count ${t.unpaid.length===0?'zero':''}">${t.unpaid.length}</span>
        <span class="unit">${t.unpaid.length===0?'fatura kaldı 🎉':'fatura bekliyor'}</span></div>
      <div class="due-amt ${t.unpaidAmt===0?'zero':''}">${t.unpaidAmt===0?'Hepsi ödendi':'Ödenecek: ₺'+fmt(t.unpaidAmt)}</div>`;
  } else {
    eyebrow = 'Bu ay toplam gelir';
    big = `<div class="answer"><span class="count">₺${fmt(t.income)}</span></div>
      <div class="due-amt ${t.balance<0?'':'zero'}">${t.balance>=0?'Bütçe artıda 💗':'Bütçe ekside ⚠'}</div>`;
  }
  return `<div class="hero">
    <div class="eyebrow">${eyebrow}</div>
    ${big}
    <div class="cari-cap">Cari durum</div>
    <div class="split">
      <div><div class="k">Gelir</div><div class="v inc">₺${fmt(t.income)}</div></div>
      <div><div class="k">Gider</div><div class="v">₺${fmt(t.expense)}</div></div>
      <div><div class="k">Bakiye</div><div class="v ${balCls}">₺${fmt(t.balance)}</div></div>
    </div>
  </div>`;
}

/* ---------- Grafik sayfası ---------- */
function chartsHtml(mk,t){
  const maxGG = Math.max(t.income,t.expense,1);
  const gg = `<div class="card">
    <h3>Bu ay: Gelir / Gider</h3><div class="sub">${monthLabel(view)}</div>
    <div class="vs-row">
      <div class="vs-top"><span class="lbl"><span class="dot" style="background:#E0568E"></span>Gelir</span><span class="val">₺${fmt(t.income)}</span></div>
      <div class="track"><div class="bar gelir" style="width:${t.income/maxGG*100}%"></div></div>
    </div>
    <div class="vs-row">
      <div class="vs-top"><span class="lbl"><span class="dot" style="background:#7A1F4D"></span>Gider</span><span class="val">₺${fmt(t.expense)}</span></div>
      <div class="track"><div class="bar gider" style="width:${t.expense/maxGG*100}%"></div></div>
    </div>
    <div class="bal-chip"><span class="bl">Kalan bakiye</span><span class="bv ${t.balance<0?'neg':'pos'}">₺${fmt(t.balance)}</span></div>
  </div>`;

  const catMap={};
  t.exp.forEach(e=>{catMap[e.category]=(catMap[e.category]||0)+(+e.amount||0);});
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const catMax=cats.length?cats[0][1]:1;
  const catCard = `<div class="card">
    <h3>Gider dağılımı</h3><div class="sub">Paran en çok nereye gidiyor?</div>
    ${cats.length? cats.map(([c,v])=>{
      const pc = t.expense? Math.round(v/t.expense*100):0;
      return `<div class="catbar">
        <div class="ct"><span class="nm"><span class="cdot" style="background:${catColor(c)}"></span> ${esc(c)}</span>
          <span><span class="pc">%${pc}</span>&nbsp;&nbsp;<span class="amt">₺${fmt(v)}</span></span></div>
        <div class="ctrack"><div class="cfill" style="width:${v/catMax*100}%"></div></div>
      </div>`;}).join("")
      : `<div class="empty">Bu ay gider yok.</div>`}
  </div>`;

  const months=[];
  for(let k=5;k>=0;k--){
    const d=new Date(view.getFullYear(),view.getMonth()-k,1);
    const key=monthKey(d);
    const it=monthItems(key);
    const inc=it.filter(x=>x.type==='income').reduce((s,x)=>s+(+x.amount||0),0);
    const exp=it.filter(x=>x.type==='expense').reduce((s,x)=>s+(+x.amount||0),0);
    months.push({d,inc,exp,cur:key===mk});
  }
  const tMax=Math.max(1,...months.flatMap(m=>[m.inc,m.exp]));
  const trendCard=`<div class="card">
    <h3>Son 6 ay</h3><div class="sub">Gelir ve gider seyri</div>
    <div class="trend">
      ${months.map(m=>`<div class="tcol">
        <div class="tbars">
          <div class="tbar g" style="height:${m.inc/tMax*100}%" title="Gelir ₺${fmt(m.inc)}"></div>
          <div class="tbar x" style="height:${m.exp/tMax*100}%" title="Gider ₺${fmt(m.exp)}"></div>
        </div>
        <div class="tlbl ${m.cur?'cur':''}">${MONTHS[m.d.getMonth()].slice(0,3)}</div>
      </div>`).join("")}
    </div>
    <div class="legend">
      <span><span class="ld" style="background:#E879A8"></span>Gelir</span>
      <span><span class="ld" style="background:#8C2756"></span>Gider</span>
    </div>
  </div>`;

  return gg+catCard+trendCard;
}

function userName(){ return USERS[user] ? USERS[user].name : ""; }
function avatarHtml(u, cls){
  const info=USERS[u]; if(!info) return "";
  return info.photo
    ? `<span class="${cls}" style="background:${info.color}"><img src="${info.photo}" alt=""></span>`
    : `<span class="${cls}" style="background:${info.color}">${info.name[0]}</span>`;
}

function renderUserSelect(){
  document.getElementById("tabbar").style.display="none";
  document.getElementById("fab").classList.add("hidden");
  document.getElementById("app").innerHTML = `
    <div class="userselect">
      <div class="us-logo">💰</div>
      <h1 class="us-title">Bal ve Lokumun<br>Mali Durumu</h1>
      <p class="us-sub">Kim giriş yapıyor?</p>
      <div class="us-cards">
        <button class="us-card" data-user="ceyda">
          ${avatarHtml("ceyda","us-av")}
          <span class="us-name">Ceyda</span>
        </button>
        <button class="us-card" data-user="taha">
          ${avatarHtml("taha","us-av")}
          <span class="us-name">Taha</span>
        </button>
      </div>
    </div>`;
}

async function selectUser(u){
  user = u;
  tab="giderler"; gview="liste"; selDate=null; view=new Date();
  document.getElementById("app").innerHTML = '<div class="loading">Yükleniyor…</div>';
  await load();
  render();
}

/* ---------- Render ---------- */
function render(){
  const mk = monthKey(view);
  ensureMonth(mk);
  if(!selDate || !selDate.startsWith(mk)) selDate = defaultSelDate(mk);
  const t = monthTotals(mk);

  let page="";
  if(tab==="giderler"){
    let viewHtml;
    if(gview==="takvim") viewHtml = calendarHtml(mk);
    else if(gview==="kategori") viewHtml = categoryHtml(t);
    else viewHtml = listHtml(t);

    page = `
      <div class="gseg">
        <button data-gview="takvim" class="${gview==='takvim'?'active':''}">📅 Takvim</button>
        <button data-gview="kategori" class="${gview==='kategori'?'active':''}">🏷️ Kategori</button>
        <button data-gview="liste" class="${gview==='liste'?'active':''}">📋 Liste</button>
      </div>
      ${viewHtml}`;
  } else if(tab==="gelirler"){
    page = `
      <div class="section">
        <div class="section-head"><h2>Gelirler</h2><div class="rule"></div><span class="tag">₺${fmt(t.income)}</span></div>
        <div class="list">${t.inc.length?byDate(t.inc).map(itemHtml).join("")
          :`<div class="empty">Henüz gelir eklemedin. Sağ alttaki <strong>+ Gider/Gelir</strong> ile başla.</div>`}</div>
      </div>`;
  } else if(tab==="grafik"){
    page = chartsHtml(mk,t);
  } else {
    page = settingsHtml();
  }

  document.getElementById("app").innerHTML = `
    <div class="topbar">
      <button class="userchip" data-act="switchuser">${avatarHtml(user,"uc-av")} ${userName()} <span class="chev">▾</span></button>
    </div>
    <div class="monthnav">
      <button data-nav="-1" aria-label="Önceki ay">‹</button>
      <div class="label">${monthLabel(view)}</div>
      <button data-nav="1" aria-label="Sonraki ay">›</button>
    </div>
    ${page}`;

  document.getElementById("tabbar").style.display="flex";
  document.querySelectorAll("#tabbar button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  const fab=document.getElementById("fab");
  fab.classList.toggle("hidden", tab==="grafik" || tab==="ayarlar");
  document.getElementById("fabLabel").textContent = "Gider/Gelir";
}

function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

/* ---------- Uygulama içi onay penceresi (native confirm yerine) ---------- */
let _confirmRes=null;
function askConfirm(msg, okLabel="Sil"){
  return new Promise(res=>{
    document.getElementById("confirmMsg").textContent=msg;
    document.getElementById("confirmYes").textContent=okLabel;
    document.getElementById("confirmScrim").classList.add("open");
    document.getElementById("confirmBox").classList.add("open");
    _confirmRes=res;
  });
}
function closeConfirm(v){
  document.getElementById("confirmScrim").classList.remove("open");
  document.getElementById("confirmBox").classList.remove("open");
  if(_confirmRes){ const r=_confirmRes; _confirmRes=null; r(v); }
}
document.getElementById("confirmYes").addEventListener("click",()=>closeConfirm(true));
document.getElementById("confirmNo").addEventListener("click",()=>closeConfirm(false));
document.getElementById("confirmScrim").addEventListener("click",()=>closeConfirm(false));

/* ---------- Etkileşim: liste ---------- */
document.getElementById("app").addEventListener("click", async (e)=>{
  const us = e.target.closest("[data-user]");
  if(us){ selectUser(us.dataset.user); return; }

  const sw = e.target.closest("[data-act='switchuser']");
  if(sw){ user=null; renderUserSelect(); return; }

  const nav = e.target.closest("[data-nav]");
  if(nav){ view.setMonth(view.getMonth()+ (+nav.dataset.nav)); selDate=null; render(); return; }

  const gv = e.target.closest("[data-gview]");
  if(gv){ gview=gv.dataset.gview; render(); return; }

  const day = e.target.closest("[data-day]");
  if(day){ selDate=day.dataset.day; render(); return; }

  const sact = e.target.closest("[data-act='delcat'],[data-act='resetall']");
  if(sact){
    if(sact.dataset.act==="resetall"){
      if(await askConfirm("Tüm veriler silinsin mi? Bu işlem geri alınamaz.","Sıfırla")){
        data={templates:[],instances:[],initialized:[]}; seedCategories(); selDate=null;
        await save(); render();
      }
      return;
    }
    if(sact.dataset.act==="delcat"){
      const name=sact.dataset.cat, type=sact.dataset.cattype;
      if(await askConfirm(`"${name}" kategorisi silinsin mi?`)){
        if(type==="income") data.incomeCats=data.incomeCats.filter(c=>c.name!==name);
        else data.categories=data.categories.filter(c=>c.name!==name);
        await save(); render();
      }
      return;
    }
  }

  const item = e.target.closest(".item");
  const act = e.target.closest("[data-act]");
  if(!item||!act) return;
  const id = item.dataset.id;
  const inst = data.instances.find(i=>i.id===id);
  if(!inst) return;

  if(act.dataset.act==="toggle"){
    inst.paid = !inst.paid;
    await save(); render();
  }
  if(act.dataset.act==="del"){
    let msg = `"${inst.title}" silinsin mi?`;
    if(inst.templateId) msg = `"${inst.title}" bu aydan silinsin mi? (Tekrar eden kalem; sonraki aylar etkilenmez.)`;
    else if(inst.installmentCount) msg = `"${inst.title}" ${inst.installmentNo}/${inst.installmentCount} taksiti silinsin mi?`;
    if(await askConfirm(msg)){
      data.instances = data.instances.filter(i=>i.id!==id);
      await save(); render();
    }
  }
});

/* ---------- Sheet (ekleme) ---------- */
const sheet=document.getElementById("sheet"), scrim=document.getElementById("scrim");
let form={type:"expense",category:"Kira",recur:true};

function openSheet(){
  const defType = tab==="gelirler" ? "income" : "expense";
  const list = catList(defType);
  form={type:defType, category:list[0]?list[0].name:"", recur:false, installment:false};
  syncType(); buildCats();
  document.getElementById("recurToggle").classList.toggle("on", form.recur);
  document.getElementById("instToggle").classList.remove("on");
  document.getElementById("instField").style.display="none";
  document.getElementById("fInst").value="";
  document.getElementById("instHint").textContent="";
  document.getElementById("fTitle").value="";
  document.getElementById("fAmount").value="";
  document.getElementById("fNewCat").value="";
  // tarih: takvimde seçili gün (görüntülenen aydaysa), yoksa bugün/ayın 1'i
  const mk=monthKey(view);
  document.getElementById("fDate").value = (selDate && selDate.startsWith(mk)) ? selDate : defaultSelDate(mk);
  document.getElementById("sheetTitle").textContent = defType==="income" ? "Yeni gelir" : "Yeni gider";
  validate();
  scrim.classList.add("open"); sheet.classList.add("open");
}
function closeSheet(){ scrim.classList.remove("open"); sheet.classList.remove("open"); }

function syncType(){
  document.querySelectorAll("#typeSeg button").forEach(b=>
    b.classList.toggle("active", b.dataset.type===form.type));
  document.getElementById("saveBtn").classList.toggle("inc", form.type==="income");
  const list = catList(form.type);
  if(!list.some(c=>c.name===form.category)) form.category = list[0]?list[0].name:"";
  // Taksit yalnızca giderlerde
  const inc = form.type==="income";
  const it=document.getElementById("instToggle");
  it.style.display = inc ? "none" : "flex";
  if(inc){ form.installment=false; it.classList.remove("on");
    document.getElementById("instField").style.display="none"; }
  updateInstHint();
}
function updateInstHint(){
  const amt=parseFloat(document.getElementById("fAmount").value.replace(",","."))||0;
  const n=parseInt(document.getElementById("fInst").value)||0;
  document.getElementById("instHint").textContent =
    (form.installment && n>=2 && amt>0) ? `Aylık ≈ ₺${fmt(round2(amt/n))} × ${n} ay` : "";
}
function buildCats(){
  const box=document.getElementById("cats");
  box.innerHTML = catList(form.type).map(c=>
    `<button class="cat ${c.name===form.category?'active':''}" data-cat="${esc(c.name)}">
      <span class="cdt" style="background:${c.color}"></span>${esc(c.name)}</button>`).join("");
}
function addCustomCategory(){
  const inp=document.getElementById("fNewCat");
  const name=inp.value.trim();
  if(!name) return;
  const list=catList(form.type);
  let cat=list.find(c=>c.name.toLowerCase()===name.toLowerCase());
  if(!cat){ cat={name,color:nextCatColor(list)}; list.push(cat); save(); }
  form.category=cat.name; inp.value=""; buildCats();
}
function validate(){
  const t=document.getElementById("fTitle").value.trim();
  const a=parseFloat(document.getElementById("fAmount").value.replace(",","."));
  const n=parseInt(document.getElementById("fInst").value)||0;
  const okInst = !form.installment || n>=2;
  document.getElementById("saveBtn").disabled = !(t && a>0 && okInst);
}

document.getElementById("fab").addEventListener("click",openSheet);
document.getElementById("tabbar").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  tab=b.dataset.tab; render();
});
scrim.addEventListener("click",closeSheet);
document.getElementById("typeSeg").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  form.type=b.dataset.type; syncType(); buildCats();
  document.getElementById("sheetTitle").textContent = form.type==="income" ? "Yeni gelir" : "Yeni gider";
});
document.getElementById("cats").addEventListener("click",e=>{
  const b=e.target.closest(".cat"); if(!b)return;
  form.category=b.dataset.cat; buildCats();
});
document.getElementById("addCatBtn").addEventListener("click",addCustomCategory);
document.getElementById("fNewCat").addEventListener("keydown",e=>{
  if(e.key==="Enter"){ e.preventDefault(); addCustomCategory(); }
});
document.getElementById("recurToggle").addEventListener("click",function(){
  form.recur=!form.recur; this.classList.toggle("on",form.recur);
  if(form.recur){ // taksit ile aynı anda olmaz
    form.installment=false;
    document.getElementById("instToggle").classList.remove("on");
    document.getElementById("instField").style.display="none";
    updateInstHint(); validate();
  }
});
document.getElementById("instToggle").addEventListener("click",function(){
  form.installment=!form.installment; this.classList.toggle("on",form.installment);
  document.getElementById("instField").style.display = form.installment ? "block" : "none";
  if(form.installment){ // her ay tekrar ile aynı anda olmaz
    form.recur=false;
    document.getElementById("recurToggle").classList.remove("on");
    document.getElementById("fInst").focus();
  }
  updateInstHint(); validate();
});
document.getElementById("fInst").addEventListener("input",()=>{ updateInstHint(); validate(); });
document.getElementById("fTitle").addEventListener("input",validate);
document.getElementById("fAmount").addEventListener("input",()=>{ updateInstHint(); validate(); });

document.getElementById("saveBtn").addEventListener("click", async ()=>{
  const title=document.getElementById("fTitle").value.trim();
  const amount=parseFloat(document.getElementById("fAmount").value.replace(",","."));
  if(!title||!(amount>0))return;
  const date=document.getElementById("fDate").value || defaultSelDate(monthKey(view));
  const mk=date.slice(0,7);
  const dueDay=parseInt(date.split("-")[2],10)||1;
  ensureMonth(mk);

  // Taksitli alış: toplam tutarı aylara böl
  if(form.type==="expense" && form.installment){
    const n=parseInt(document.getElementById("fInst").value)||0;
    if(n>=2){
      const each=round2(amount/n);
      const first=round2(amount-each*(n-1)); // küsuratı ilk takside ekle
      const gid=uid();
      const [Y,M]=date.split("-").map(Number);
      for(let k=0;k<n;k++){
        const dt=new Date(Y, M-1+k, 1);
        const mkk=monthKey(dt);
        ensureMonth(mkk);
        data.instances.push({
          id:uid(), templateId:null, type:"expense", title,
          amount:(k===0?first:each), category:form.category, dueDay,
          date:instDate(mkk,dueDay), month:mkk, paid:false,
          installmentNo:k+1, installmentCount:n, groupId:gid
        });
      }
      view=new Date(date+"T00:00:00"); selDate=date; tab="giderler";
      await save(); closeSheet(); render();
      return;
    }
  }

  let templateId=null;
  if(form.recur){
    const tpl={id:uid(),type:form.type,title,amount,category:form.category,dueDay};
    data.templates.push(tpl); templateId=tpl.id;
  }
  data.instances.push({id:uid(),templateId,type:form.type,title,amount,
    category:form.category,dueDay,date,month:mk,paid:(form.type==="expense" && !form.recur)});

  // eklenen kalemin ayına/gününe ve doğru sayfasına geç ki kullanıcı sonucu görsün
  view=new Date(date+"T00:00:00"); selDate=date;
  tab = form.type==="income" ? "gelirler" : "giderler";
  await save(); closeSheet(); render();
});

/* ---------- Başlat ---------- */
renderUserSelect();
</script>
